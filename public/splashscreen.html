<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TermaType</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #F5F3EE;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: #3a3530;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1815;
        color: #e8e4da;
      }
      .spinner { border-color: rgba(232, 228, 218, 0.15); border-top-color: #D88865; }
    }
    .logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 13px;
      opacity: 0.55;
      margin-bottom: 32px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid rgba(58, 53, 48, 0.12);
      border-top-color: #D88865;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">TermaType</div>
  <div class="tagline">Beautiful bilingual writing</div>
  <div class="spinner"></div>
</body>
</html>
